name: Build devcontainer image

# .devcontainer の Dockerfile / profile を GHCR にビルド&公開する。
# これにより、テンプレートから作られた各リポジトリは起動時にイメージを
# pull するだけでよく、TeX Live のインストール（install-tl）が走らない。
on:
  push:
    branches: [main]
    paths:
      - '.devcontainer/Dockerfile'
      - '.devcontainer/texlive.profile'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Apple Silicon でのローカル Dev Container もネイティブ実行できるよう
      # amd64（Codespaces）と arm64 の両方をビルドする。
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 公開済みイメージ（マルチ arch・レジストリ上の圧縮後）のサイズを Summary に出す。
      # PR 側の validate-devcontainer.yml は単一 arch・ローカルの非圧縮サイズなので、
      # こちらは「実際に pull される配布物の大きさ」を main 上で継続可視化する補完。
      - name: Show published image size
        continue-on-error: true
        run: |
          {
            echo "## Dev Container image (\`${IMAGE}:latest\`)"
            echo
            echo "### Compressed size per platform（pull 時のダウンロード量の目安）"
            echo "| Platform | Compressed size |"
            echo "|---|---|"
            docker buildx imagetools inspect "${IMAGE}:latest" --raw > /tmp/index.json
            for digest in $(jq -r '.manifests[] | select(.platform.os != "unknown") | .digest' /tmp/index.json); do
              platform=$(jq -r --arg d "$digest" '.manifests[] | select(.digest==$d) | "\(.platform.os)/\(.platform.architecture)"' /tmp/index.json)
              bytes=$(docker buildx imagetools inspect "${IMAGE}@${digest}" --raw | jq '[.layers[].size, .config.size] | add')
              echo "| ${platform} | $(( bytes / 1024 / 1024 )) MiB |"
            done
            echo
            echo "<details><summary>manifest（docker buildx imagetools inspect）</summary>"
            echo
            echo '```'
            docker buildx imagetools inspect "${IMAGE}:latest"
            echo '```'
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
