name: Build devcontainer image

# .devcontainer の Dockerfile / profile を GHCR にビルド&公開する。
# これにより、テンプレートから作られた各リポジトリは起動時にイメージを
# pull するだけでよく、TeX Live のインストール（install-tl）が走らない。
on:
  push:
    branches: [main]
    paths:
      - '.devcontainer/Dockerfile'
      - '.devcontainer/texlive.profile'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Apple Silicon でのローカル Dev Container もネイティブ実行できるよう
      # amd64（Codespaces）と arm64 の両方をビルドする。
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show image size
        run: |
          {
            echo "## Dev Container image"
            echo
            echo '```'
            docker buildx imagetools inspect "${IMAGE}:latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
